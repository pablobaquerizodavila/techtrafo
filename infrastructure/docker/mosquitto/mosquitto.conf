# Mosquitto MQTT - TECHTRAFO
# Acceso solo desde la red docker techtrafo_net (sin port mapping al host).
# Si en el futuro se conecta un gateway externo, agregar passwd file y
# allow_anonymous false.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

# Logs van a stdout (accesible via docker logs techtrafo-mosquitto).
log_dest stdout
log_type error
log_type warning
log_type notice

# Topics esperados:
#   techtrafo/transformador/<equipo_id>/<variable>
# Payload JSON:
#   { "valor": 65.3, "unidad": "celsius", "ts": "2026-05-23T22:00:00Z" }
