# ═══════════════════════════════════════════════════════════════════
# techtrafo-nginx — proxy interno (hardening B-1, 2026-06-08)
# Rutas:
#   api.techtrafo.com   → techtrafo-api:3000  (via Docker DNS)
#   panel/portal.*.com  → techtrafo-web:3002  (via Docker DNS)
#   /health             → 200 OK (health check)
#   /grafana/           → grafana:3000
# El edge .7 apunta a este nginx en :8080; 3000/3002 quedan
# bindeados a 127.0.0.1 (solo loopback) en el host.
# ═══════════════════════════════════════════════════════════════════

# Necesario para WebSocket (Next.js HMR + live)
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       close;
}

# ─── api.techtrafo.com ───────────────────────────────────────────
server {
    listen 80;
    server_name api.techtrafo.com;
    client_max_body_size 25M;   # B-4: alineado con UPLOAD_MAX_BYTES=20MB del API

    location / {
        proxy_pass          http://techtrafo-api:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $http_x_real_ip;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
    }

    access_log  /var/log/nginx/api-access.log;
    error_log   /var/log/nginx/api-error.log;
}

# ─── panel.techtrafo.com / portal.techtrafo.com ───────────────────
server {
    listen 80;
    server_name panel.techtrafo.com portal.techtrafo.com;
    client_max_body_size 25M;   # B-4: mismo límite que el API para uploads desde el panel

    location / {
        proxy_pass          http://techtrafo-web:3002;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $http_x_real_ip;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
    }

    access_log  /var/log/nginx/web-access.log;
    error_log   /var/log/nginx/web-error.log;
}

# ─── Catch-all: salud + Grafana ──────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /health {
        access_log  off;
        return 200  "OK\n";
        add_header  Content-Type text/plain;
    }

    location /grafana/ {
        proxy_pass          http://grafana:3000/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
    }

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;
}
