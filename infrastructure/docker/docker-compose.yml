# ===================================================================
# TECHTRAFO - Stack base de infraestructura
# ===================================================================
# Estado: validado en produccion el 22 de mayo de 2026
# Ubicacion: PC Ubuntu 192.168.0.23 - /opt/techtrafo/
#
# Servicios activos:
#   postgres  - PostgreSQL 16 (datos del negocio)
#   redis     - cache y colas
#   grafana   - dashboards de KPIs
#   nginx     - proxy local + health check
#   api       - backend Node.js + Express + TypeScript + Prisma (FASE 3.2)
#   web       - frontend Next.js 15 + Tailwind + shadcn/ui (FASE 3.5)
#
# Servicios pendientes:
#   minio         - storage S3 cuando se active carga de archivos
#   influxdb      - fase SCADA (opcion A o C)
#   mosquitto     - broker MQTT para sensores
#
# Uso:
#   docker compose up -d        - levantar stack
#   docker compose down         - detener (mantiene datos)
#   docker compose logs -f      - ver logs en vivo
#   docker compose restart NOM  - reiniciar un servicio especifico
# ===================================================================

name: techtrafo

services:

  postgres:
    image: postgres:16-alpine
    container_name: techtrafo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/techtrafo/postgres-data:/var/lib/postgresql/data
    networks:
      - techtrafo_net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techtrafo-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - /opt/techtrafo/redis-data:/data
    networks:
      - techtrafo_net
    ports:
      - "127.0.0.1:6379:6379"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: techtrafo-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      GF_SERVER_ROOT_URL: "http://192.168.0.23:3001"
      # SMTP para Grafana Alerting (FASE 8). Reusa la cuenta MailPlus de Synology.
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST}:${SMTP_PORT}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASS}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-notificaciones@medicvip.org}
      GF_SMTP_FROM_NAME: TECHTRAFO Alerting
      GF_SMTP_SKIP_VERIFY: "true"
      # Pass-through para resolver ${GRAFANA_DB_PASSWORD} en provisioning/datasources/postgres.yaml
      # Fix H4 auditoria: usar grafana_ro (SELECT-only en comercial/posventa/produccion)
      # en lugar de techtrafo_admin (DB superuser). Migration 017 crea el rol.
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
      # Pass-through para resolver ${INFLUX_ADMIN_TOKEN} en provisioning/datasources/influx.yaml
      INFLUX_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-techtrafo}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-telemetria}
    volumes:
      - /opt/techtrafo/grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards-techtrafo:ro
    networks:
      - techtrafo_net
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: techtrafo-nginx
    restart: unless-stopped
    volumes:
      - /opt/techtrafo/nginx-conf:/etc/nginx/conf.d:ro
      - /opt/techtrafo/nginx-logs:/var/log/nginx
    networks:
      - techtrafo_net
    ports:
      - "8080:80"
    depends_on:
      - grafana

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    container_name: techtrafo-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${API_NODE_ENV:-development}
      PORT: 3000
      # DNS interna de docker: techtrafo-postgres en techtrafo_net
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@techtrafo-postgres:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://192.168.0.23:3002}
      # SMTP (notificaciones 4.D). Si SMTP_HOST queda vacio el worker entra en dry-run.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-TECHTRAFO <noreply@techtrafo.com>}
      PANEL_URL: ${PANEL_URL:-https://panel.techtrafo.com}
      NOTIF_WORKER_INTERVAL_SECONDS: ${NOTIF_WORKER_INTERVAL_SECONDS:-300}
      UPLOAD_DIR: ${UPLOAD_DIR:-/uploads}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-20971520}
      # SCADA (bridge MQTT->Influx corre dentro del API)
      MQTT_URL: ${MQTT_URL:-mqtt://techtrafo-mosquitto:1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-techtrafo/transformador/+/+}
      INFLUX_URL: ${INFLUX_URL:-http://techtrafo-influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_ADMIN_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-techtrafo}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-telemetria}
      SCADA_BRIDGE_ENABLED: ${SCADA_BRIDGE_ENABLED:-true}
    volumes:
      - ../../backend:/app
      - /app/node_modules
    networks:
      - techtrafo_net
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    container_name: techtrafo-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${WEB_NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.0.23:3000}
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - techtrafo_net
    ports:
      - "3002:3002"
    depends_on:
      - api

  # ===================================================================
  # SCADA stack (FASE 7 - simulador hoy, hardware real cuando aterrice)
  # ===================================================================

  influxdb:
    image: influxdb:2.7
    container_name: techtrafo-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-techtrafo}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-telemetria}
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
    volumes:
      - /opt/techtrafo/influxdb-data:/var/lib/influxdb2
      - /opt/techtrafo/influxdb-config:/etc/influxdb2
    networks:
      - techtrafo_net
    ports:
      - "127.0.0.1:8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: techtrafo-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - /opt/techtrafo/mosquitto-data:/mosquitto/data
      - /opt/techtrafo/mosquitto-logs:/mosquitto/log
    networks:
      - techtrafo_net
    # Sin port mapping al host: solo accesible desde la red docker.
    # Si en el futuro hay un gateway externo, agregar "1883:1883" y auth.

  simulador:
    image: node:20-alpine
    container_name: techtrafo-simulador
    restart: unless-stopped
    working_dir: /app
    # npm install al arrancar (idempotente con package-lock una vez generado).
    # Cuando llegue hardware real, este servicio se apaga sin perfil simulador.
    command: ["sh", "-c", "npm install --no-audit --no-fund --omit=dev && node simulador.js"]
    environment:
      MQTT_URL: mqtt://techtrafo-mosquitto:1883
      EQUIPO_ID: ${SIMULADOR_EQUIPO_ID:-TRF-DEMO-001}
      INTERVALO_MS: ${SIMULADOR_INTERVALO_MS:-10000}
    volumes:
      - ./simulador:/app
    networks:
      - techtrafo_net
    depends_on:
      - mosquitto
    profiles:
      - simulador

networks:
  techtrafo_net:
    name: techtrafo_net
    driver: bridge
