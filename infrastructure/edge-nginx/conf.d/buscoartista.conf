server {
    listen 80;
    server_name buscoartista.com www.buscoartista.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2;
    server_name buscoartista.com www.buscoartista.com;
    ssl_certificate     /etc/letsencrypt/live/buscoartista.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buscoartista.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    location / {
        proxy_pass http://192.168.0.116;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 25M;
        proxy_read_timeout 60s;
    }
}
