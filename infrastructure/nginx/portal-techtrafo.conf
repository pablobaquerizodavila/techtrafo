
# ===== HTTPS portal.techtrafo.com (proxy al PC Ubuntu Docker :3002) =====
# Comparte cert SAN con panel.techtrafo.com y api.techtrafo.com.
# El middleware Next.js detecta Host=portal.* y reescribe / -> /portal/*.
server {
    listen 443 ssl;
    server_name portal.techtrafo.com;
    ssl_certificate     /etc/letsencrypt/live/panel.techtrafo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.techtrafo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://192.168.0.23:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }
}
