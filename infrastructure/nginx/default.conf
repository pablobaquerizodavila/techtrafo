# ===================================================================
# nginx - configuracion del proxy interno
# ===================================================================
# Este archivo va a: /opt/techtrafo/nginx-conf/default.conf
# nginx lo carga automaticamente al arrancar.
#
# Funciones:
#   - Servir pagina de bienvenida con estado del stack
#   - Endpoint /health para validacion
#
# El proxy a subdominios (panel, api, grafana) se configurara
# en el NAS Synology con Application Portal.
# ===================================================================

server {
    listen 80;
    server_name _;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location = / {
        return 200 'TECHTRAFO Stack inicial operativo. Grafana en :3001';
        add_header Content-Type text/plain;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
