# /etc/nginx/snippets/block-credential-scans.conf
#
# Bloquea scans automatizados de credenciales/config antes de que lleguen
# al backend. Aplicado a vhosts que proxypasean a backends de TECHTRAFO.
#
# IMPORTANTE: NO bloquea ".json" al final del URI en general, porque Next.js
# (frontend techtrafo) sirve /manifest.json y /_next/data/<hash>/*.json
# legitimamente. Solo bloquea nombres de archivo .json tipicamente usados
# para credenciales de servicio.
#
# Agregado el 2026-05-23 tras detectar scans repetidos en docker logs
# techtrafo-api probando /development/.env, /service-account.json, etc.

# Directorios dotfile (matchea /.git/config, /.env, /.env.production, /.svn/wc.db, etc.)
location ~ /\.(env|git|svn|hg|aws|ssh|docker|vscode|idea|terraform|vagrant|config)(/|$|\.) {
    access_log off;
    return 404;
}

# Extensiones tipicas de archivos sensibles
location ~* \.(sql|sqlite[0-9]?|bak|swp|swo|orig|old|backup|pem|key|crt|p12|pfx|sh|bash|cgi|asp|aspx|dll|exe|htaccess|htpasswd)$ {
    access_log off;
    return 404;
}

# Archivos .json con keywords de credenciales en cualquier parte del nombre
# (matchea service-account.json, firebase-adminsdk-abc.json, gcp-key-prod.json, etc.)
# NO matchea manifest.json, _next/data/<hash>/page.json (no contienen keywords)
location ~* /[a-z0-9._-]*(service[_-]?account|firebase|gcp|gcloud|google-?credentials|google-?services|google-?service-?account|application[_-]?default|client[_-]?secret|key[_-]?file|cloud[_-]?key|^credentials|secret[s]?|aws[_-]?credentials)[a-z0-9._-]*\.json$ {
    access_log off;
    return 404;
}

# /credentials.json y /key.json bare en la raiz (match exacto, no en subpaths legitimos)
location ~* ^/(credentials|key|sa|keyfile)\.json$ {
    access_log off;
    return 404;
}

# CMS/admin paths que no usamos (WordPress, phpMyAdmin, etc.)
location ~* /(wp-|wordpress|wlwmanifest|xmlrpc\.php|admin\.php|phpmyadmin|pma/|adminer|wp-config|wp-login|wp-admin|server-status|server-info|phpinfo|info\.php|_profiler/|debug/) {
    access_log off;
    return 404;
}

# Carpetas de config/herramientas que nunca deberian exponerse via HTTP
location ~* /(\.config|\.aws|\.ssh|\.docker|\.vscode|\.idea|\.terraform|\.vagrant|node_modules|vendor)/ {
    access_log off;
    return 404;
}
