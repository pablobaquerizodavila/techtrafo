# siscormed.com — HTML + PHP API en /api

server {
    listen 80;
    server_name siscormed.com www.siscormed.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name siscormed.com www.siscormed.com;

    ssl_certificate     /etc/letsencrypt/live/siscormed.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siscormed.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/sites/siscormed;
    index index.html;

    access_log /var/log/nginx/siscormed.access.log;
    error_log  /var/log/nginx/siscormed.error.log;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/api/.+\.php$ {
        fastcgi_pass web-php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }

    location ~ /api/config\.(local|example)\.php$ { deny all; }
    location ~ /api/_lib\.php$                    { deny all; }
    location ~ /\.(ht|git)                        { deny all; }
}
