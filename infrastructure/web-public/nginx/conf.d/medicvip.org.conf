# medicvip.org — PHP 8.2

server {
    listen 80;
    server_name medicvip.org www.medicvip.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name medicvip.org www.medicvip.org;

    ssl_certificate     /etc/letsencrypt/live/medicvip.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medicvip.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/sites/medicvip;
    index index.html index.php;

    access_log /var/log/nginx/medicvip.access.log;
    error_log  /var/log/nginx/medicvip.error.log;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        fastcgi_pass web-php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ /(api\.config\.php|api\.config\.example\.php)$ { deny all; }
    location ~ /\.(ht|git)                                    { deny all; }
}
