# Server default: hosts no configurados reciben 444 (close conn)

server {
    listen 80 default_server;
    server_name _;

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}

# Default SSL para que nginx no crashee si llega un :443 con Host no configurado.
# Usa el cert de techtrafo.com como fallback.
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/techtrafo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techtrafo.com/privkey.pem;

    return 444;
}
