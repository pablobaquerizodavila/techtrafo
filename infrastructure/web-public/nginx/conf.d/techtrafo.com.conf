# techtrafo.com — landing estática (HTML + JSX + CSS)

# HTTP → redirect a HTTPS (excepto ACME challenge)
server {
    listen 80;
    server_name techtrafo.com www.techtrafo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name techtrafo.com www.techtrafo.com;

    ssl_certificate     /etc/letsencrypt/live/techtrafo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techtrafo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/sites/techtrafo;
    index index.html;

    access_log /var/log/nginx/techtrafo.access.log;
    error_log  /var/log/nginx/techtrafo.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jsx|svg|png|jpg|jpeg|gif|webp|woff2?|ttf|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control public, immutable;
    }

    location ~ ~$            { deny all; }
    location ~ \.backup-     { deny all; }
}
