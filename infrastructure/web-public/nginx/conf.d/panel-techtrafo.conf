# panel.techtrafo.com / api.techtrafo.com / portal.techtrafo.com
# Comparten el cert SAN de techtrafo.com (incluye estos 3 subdominios).

# ─── HTTP → HTTPS redirect (todos los subdominios) ──────────────────
server {
    listen 80;
    server_name panel.techtrafo.com api.techtrafo.com portal.techtrafo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── panel.techtrafo.com :443 → techtrafo-web :3002 ─────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name panel.techtrafo.com;

    ssl_certificate     /etc/letsencrypt/live/techtrafo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techtrafo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/panel-techtrafo.access.log;
    error_log  /var/log/nginx/panel-techtrafo.error.log;

    client_max_body_size 20M;

    location / {
        proxy_pass http://techtrafo-web:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 60s;
    }
}

# ─── api.techtrafo.com :443 → techtrafo-api :3000 ───────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.techtrafo.com;

    ssl_certificate     /etc/letsencrypt/live/techtrafo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techtrafo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

